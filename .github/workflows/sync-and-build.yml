name: Sync upstream, apply HKD patch & build

on:
  schedule:
    # 每天 UTC 02:00 自動執行（香港時間 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-patch-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # 1. Checkout 你自己的 fork
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 設定 git 用戶
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 3. Sync 上游最新代碼
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/hypooo/app-store-price.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || {
            echo "::error::Upstream merge conflict! Please resolve manually."
            git merge --abort
            exit 1
          }

      # 4. 還原自己的 README（防止被上游覆蓋）
      - name: Restore custom README
        run: cp docs/MY_README.md README.md

      # 5. 應用 HKD patch
      - name: Apply HKD patch
        run: python3 patches/apply_hkd_patch.py

      # 6. Commit 改動（如有）
      - name: Commit patched changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: apply HKD base currency patch"
            git push origin main
          fi

      # 7. 建立 multi-stage Dockerfile（用 Maven 官方 image 編譯，避免環境問題）
      - name: Create CI Dockerfile
        run: |
          cat > Dockerfile.ci << 'EOF'
          # Stage 1: Maven build（用官方 Maven + Amazon Corretto 21 image）
          FROM maven:3.9-amazoncorretto-21 AS builder
          WORKDIR /build
          # 先 copy pom.xml 以利用 Docker layer cache
          COPY pom.xml .
          RUN mvn dependency:go-offline -q
          # 再 copy 源碼並編譯
          COPY src ./src
          RUN mvn -B package -DskipTests -q

          # Stage 2: Runtime image（同原 Dockerfile）
          FROM amazoncorretto:21-alpine
          ENV LANG=C.UTF-8
          ENV TZ=Asia/Shanghai
          RUN apk add --no-cache tzdata && \
              cp /usr/share/zoneinfo/${TZ} /etc/localtime && \
              echo "${TZ}" > /etc/timezone && \
              apk del tzdata && \
              rm -rf /var/cache/apk/*
          WORKDIR /app
          EXPOSE 8080
          COPY --from=builder /build/target/app-store-price-*.jar ./app.jar
          ENTRYPOINT ["java", "-jar", "app.jar"]
          EOF

      # 8. 登入 GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 9. Build & Push Docker image（用 multi-stage Dockerfile）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/app-store-price:latest
            ghcr.io/${{ github.repository_owner }}/app-store-price:${{ github.sha }}

      - name: Done
        run: echo "✅ Image pushed → ghcr.io/${{ github.repository_owner }}/app-store-price:latest"
